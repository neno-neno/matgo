version: "3.9"

services:
  api:
    build:
      context: ./apps/api
    container_name: matematica-api
    environment:
      MTD_ENVIRONMENT: production
      MTD_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: matematica-web
    environment:
      API_URL: http://api:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
