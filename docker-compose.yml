version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: matematica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: matematica_todo_dia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
